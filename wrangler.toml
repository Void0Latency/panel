name = "voidlatency-panel"
main = "voidlatency-core.js"
compatibility_date = "2024-12-18"

[[d1_databases]]
binding = "VL_DB"
database_name = "voidlatency-db"
database_id = ""

[triggers]
# 00:00 UTC == 03:30 Asia/Tehran (UTC+3:30, no DST). Daily traffic reset;
# only runs when "reset_scheduler" is enabled in Panel Settings.
crons = ["0 0 * * *"]

[vars]
NODE_VERSION = "18"

[env.production]
vars = { ENVIRONMENT = "production" }

[observability]
enabled = true
head_sampling_rate = 1

[logging]
enabled = true
